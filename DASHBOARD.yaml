title: AWS Infrastructure
views:
  - title: Overview
    path: aws-overview
    icon: mdi:aws
    cards:
      - type: markdown
        content: |
          # 💰 AWS Costs
      - type: horizontal-stack
        cards:
          - type: entity
            entity: sensor.aws_live_us_east_1_cost_today
            name: Yesterday
            icon: mdi:cash
          - type: entity
            entity: sensor.aws_live_us_east_1_cost_mtd
            name: Month to Date
            icon: mdi:calendar-cash
      - type: markdown
        content: |
          # 📊 Global Summary

          {% set total_running = namespace(count=0) %}
          {% set total_stopped = namespace(count=0) %}
          {% set total_rds = namespace(count=0) %}
          {% set total_lambda = namespace(count=0) %}
          {% set active_regions = namespace(list=[]) %}

          {% for state in states.sensor %}
            {% if 'aws_live' in state.entity_id and '_ec2_instances_running' in state.entity_id %}
              {% set count = state.state | int(0) %}
              {% set total_running.count = total_running.count + count %}
              {% if count > 0 %}
                {% set region = state.entity_id.split('_')[2:5] | join('-') %}
                {% if region not in active_regions.list %}
                  {% set active_regions.list = active_regions.list + [region] %}
                {% endif %}
              {% endif %}
            {% elif 'aws_live' in state.entity_id and '_ec2_instances_stopped' in state.entity_id %}
              {% set total_stopped.count = total_stopped.count + (state.state | int(0)) %}
            {% elif 'aws_live' in state.entity_id and '_rds_total_instances' in state.entity_id %}
              {% set total_rds.count = total_rds.count + (state.state | int(0)) %}
            {% elif 'aws_live' in state.entity_id and '_lambda_total_functions' in state.entity_id %}
              {% set total_lambda.count = total_lambda.count + (state.state | int(0)) %}
            {% endif %}
          {% endfor %}

          **Across All Regions:**
          - 🌍 Active Regions: {{ active_regions.list | length }}
          - 🟢 EC2 Running: {{ total_running.count }}
          - 🔴 EC2 Stopped: {{ total_stopped.count }}
          - 🗄️ RDS Databases: {{ total_rds.count }}
          - ⚡ Lambda Functions: {{ total_lambda.count }}
      - type: markdown
        content: >
          # 🖥️ All EC2 Instances


          {% for state in states.sensor %}
            {% if 'aws_live' in state.entity_id and '_ec2_i_' in state.entity_id and '_state' in state.entity_id %}
              {% set parts = state.entity_id.split('_') %}
              {% set region = parts[2] + '-' + parts[3] + '-' + parts[4] %}
              {% set instance_id = parts[6] %}
              {% set instance_state = states(state.entity_id) %}
              {% if instance_state == 'running' %}
                {% set icon = '🟢' %}
              {% elif instance_state == 'stopped' %}
                {% set icon = '🔴' %}
              {% else %}
                {% set icon = '⚫' %}
              {% endif %}
          - {{ icon }} **{{ region | upper }}**: `i-{{ instance_id }}` - *{{
          instance_state }}*
            {% endif %}
          {% endfor %}


          _Click instances in Developer Tools → States for details_
      - type: markdown
        content: |
