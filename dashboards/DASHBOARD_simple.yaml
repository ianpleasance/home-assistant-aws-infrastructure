title: AWS Overview
views:
  - title: Overview
    path: aws-overview
    icon: mdi:aws
    cards:
      - type: markdown
        content: >
          # 🌍 AWS Global Overview


          {% set total = states('sensor.aws_live_global_summary') | int(0) %}
          {% set active_regions = state_attr('sensor.aws_live_global_summary', 'active_regions') | int(0) %}

          **Total Resources:** {{ total }} • **Active Regions:** {{ active_regions }}


          ### 💻 Compute

          - **EC2 Running:** {{ state_attr('sensor.aws_live_global_summary', 'ec2_running') | int(0) }} | Stopped: {{ state_attr('sensor.aws_live_global_summary', 'ec2_stopped') | int(0) }}

          - **Lambda Functions:** {{ state_attr('sensor.aws_live_global_summary', 'lambda_functions') | int(0) }}

          - **ECS Clusters:** {{ state_attr('sensor.aws_live_global_summary', 'ecs_clusters') | int(0) }}

          - **EKS Clusters:** {{ state_attr('sensor.aws_live_global_summary', 'eks_clusters') | int(0) }}

          - **Auto Scaling Groups:** {{ state_attr('sensor.aws_live_global_summary', 'auto_scaling_groups') | int(0) }}

          - **Beanstalk Environments:** {{ state_attr('sensor.aws_live_global_summary', 'beanstalk_environments') | int(0) }}


          ### 🗄️ Data & Storage

          - **RDS Databases:** {{ state_attr('sensor.aws_live_global_summary', 'rds_instances') | int(0) }}

          - **DynamoDB Tables:** {{ state_attr('sensor.aws_live_global_summary', 'dynamodb_tables') | int(0) }}

          - **ElastiCache Clusters:** {{ state_attr('sensor.aws_live_global_summary', 'elasticache_clusters') | int(0) }}

          - **S3 Buckets:** {{ state_attr('sensor.aws_live_global_summary', 's3_buckets') | int(0) }}

          - **EBS Volumes:** {{ state_attr('sensor.aws_live_global_summary', 'ebs_volumes') | int(0) }} ({{ state_attr('sensor.aws_live_global_summary', 'ebs_unattached') | int(0) }} unattached)

          - **EFS File Systems:** {{ state_attr('sensor.aws_live_global_summary', 'efs_file_systems') | int(0) }}


          ### 🌐 Networking & Messaging

          - **ALB/NLB Load Balancers:** {{ state_attr('sensor.aws_live_global_summary', 'load_balancers') | int(0) }}

          - **Classic Load Balancers:** {{ state_attr('sensor.aws_live_global_summary', 'classic_load_balancers') | int(0) }}

          - **Elastic IPs:** {{ state_attr('sensor.aws_live_global_summary', 'elastic_ips') | int(0) }} ({{ state_attr('sensor.aws_live_global_summary', 'elastic_ips_unattached') | int(0) }} unattached)

          - **SNS Topics:** {{ state_attr('sensor.aws_live_global_summary', 'sns_topics') | int(0) }}

          - **SQS Queues:** {{ state_attr('sensor.aws_live_global_summary', 'sqs_queues') | int(0) }}

          - **Kinesis Streams:** {{ state_attr('sensor.aws_live_global_summary', 'kinesis_streams') | int(0) }}


          ### 🔌 APIs & CDN

          - **API Gateways:** {{ state_attr('sensor.aws_live_global_summary', 'api_gateways') | int(0) }}

          - **CloudFront Distributions:** {{ state_attr('sensor.aws_live_global_summary', 'cloudfront_distributions') | int(0) }}

          - **Route 53 Hosted Zones:** {{ state_attr('sensor.aws_live_global_summary', 'route53_zones') | int(0) }}


          ### 📊 Monitoring

          - **CloudWatch Alarms:** {{ state_attr('sensor.aws_live_global_summary', 'cloudwatch_alarms') | int(0) }} ({{ state_attr('sensor.aws_live_global_summary', 'cloudwatch_alarms_alarm') | int(0) }} in ALARM state)
      - type: markdown
        content: >
          ## 💰 Current AWS Costs


          {% set yesterday = states('sensor.aws_live_global_cost_yesterday') %}
          {% set mtd = states('sensor.aws_live_global_cost_month_to_date') %}

          {% if yesterday in ['unknown', 'unavailable'] or mtd in ['unknown', 'unavailable'] %}
          **⏳ Cost data is being collected...**

          AWS Cost Explorer data typically takes 24 hours to populate after initial setup.
          Check back tomorrow!
          {% else %}

          | Period | Amount |
          |--------|--------|
          | 💵 Yesterday | ${{ yesterday }} |
          | 📅 Month to Date | ${{ mtd }} |

          {% endif %}
      - type: conditional
        conditions:
          - condition: state
            entity: sensor.aws_live_global_cost_yesterday
            state_not: unknown
          - condition: state
            entity: sensor.aws_live_global_cost_yesterday
            state_not: unavailable
        card:
          type: history-graph
          title: 📈 Daily Cost Trend (Last 7 Days)
          hours_to_show: 168
          entities:
            - entity: sensor.aws_live_global_cost_yesterday
              name: Daily Cost
      - type: conditional
        conditions:
          - condition: state
            entity: sensor.aws_live_global_cost_month_to_date
            state_not: unknown
          - condition: state
            entity: sensor.aws_live_global_cost_month_to_date
            state_not: unavailable
        card:
          type: history-graph
          title: 📊 Month to Date Cost Growth
          hours_to_show: 720
          entities:
            - entity: sensor.aws_live_global_cost_month_to_date
              name: MTD Cost
      - type: markdown
        content: >
          ## 🔝 Top Service Costs (Yesterday)


          {% set service_sensors = states.sensor | selectattr('entity_id', 'search', 'sensor.aws_live_global_cost_service_') | list %}
          {% if service_sensors | length > 0 %}

          | Service | Cost | % |
          |---------|------|---|
          {% for sensor in service_sensors | sort(attribute='state', reverse=true) -%}
          {%- if sensor.state not in ['unknown', 'unavailable'] -%}
          | {{ sensor.attributes.service_name | default(sensor.name | replace('cost service ', '')) | title }} | ${{ sensor.state }} | {{ sensor.attributes.percentage | default(0) }}% |
          {% endif -%}
          {%- endfor %}
          {% else %}
          _Cost breakdown will appear after 24 hours_
          {% endif %}
      - type: markdown
        content: >
          # 🌍 Resources by Region


          {% for state in states.sensor -%}
          {%- if 'aws_live' in state.entity_id and state.entity_id.endswith('_summary') and 'global' not in state.entity_id -%}
          {%- if state.state not in ['unknown', 'unavailable'] and state.state | int(0) > 0 -%}
          {%- set region = state.attributes.region -%}
          {%- set ec2_r = state.attributes.ec2_running | default(0) -%}
          {%- set lambda_f = state.attributes.lambda_functions | default(0) -%}
          {%- set rds = state.attributes.rds_instances | default(0) -%}
          {%- set dynamo = state.attributes.dynamodb_tables | default(0) -%}
          {%- set s3 = state.attributes.s3_buckets | default(0) -%}
          {%- set apigw = state.attributes.api_gateways | default(0) -%}
          {%- set eb = state.attributes.beanstalk_environments | default(0) %}

          **{{ region | upper | replace('_', '-') }}:** {{ state.state }} resources
          (EC2: {{ ec2_r }}, Lambda: {{ lambda_f }}, RDS: {{ rds }}, DynamoDB: {{ dynamo }}, S3: {{ s3 }}{% if apigw > 0 %}, API GW: {{ apigw }}{% endif %}{% if eb > 0 %}, Beanstalk: {{ eb }}{% endif %})
          {% endif -%}
          {%- endif -%}
          {%- endfor %}
      - type: markdown
        content: >
          # 📍 Regional Details


          {% for state in states.sensor -%}
          {%- if 'aws_live' in state.entity_id and state.entity_id.endswith('_summary') and 'global' not in state.entity_id -%}
          {%- if state.state not in ['unknown', 'unavailable', 'None'] and state.state | int(0) > 0 -%}
          {%- set region = state.attributes.region -%}
          {%- set region_name = region | upper | replace('_', '-') -%}
          {%- set flag_map = {
            'us-east-1': '🇺🇸', 'us-east-2': '🇺🇸', 'us-west-1': '🇺🇸', 'us-west-2': '🇺🇸',
            'eu-west-1': '🇮🇪', 'eu-west-2': '🇬🇧', 'eu-west-3': '🇫🇷',
            'eu-central-1': '🇩🇪', 'eu-north-1': '🇸🇪', 'eu-south-1': '🇮🇹',
            'ap-south-1': '🇮🇳', 'ap-northeast-1': '🇯🇵', 'ap-northeast-2': '🇰🇷',
            'ap-northeast-3': '🇯🇵', 'ap-southeast-1': '🇸🇬', 'ap-southeast-2': '🇦🇺',
            'ca-central-1': '🇨🇦', 'sa-east-1': '🇧🇷'
          } -%}
          {%- set flag = flag_map.get(region, '🌍') %}

          ### {{ flag }} {{ region_name }}

          **Total Resources:** {{ state.state }}

          #### 💻 Compute
          | Resource | Count |
          |----------|-------|
          | 🟢 EC2 Running | {{ state.attributes.ec2_running | default(0) }} |
          | 🔴 EC2 Stopped | {{ state.attributes.ec2_stopped | default(0) }} |
          | ⚡ Lambda Functions | {{ state.attributes.lambda_functions | default(0) }} |
          | 🐳 ECS Clusters | {{ state.attributes.ecs_clusters | default(0) }} |
          | ☸️ EKS Clusters | {{ state.attributes.eks_clusters | default(0) }} |
          | 📈 Auto Scaling Groups | {{ state.attributes.auto_scaling_groups | default(0) }} |
          | 🌱 Beanstalk Environments | {{ state.attributes.beanstalk_environments | default(0) }} |

          #### 🗄️ Data & Storage
          | Resource | Count |
          |----------|-------|
          | 🗄️ RDS Databases | {{ state.attributes.rds_instances | default(0) }} |
          | 📊 DynamoDB Tables | {{ state.attributes.dynamodb_tables | default(0) }} |
          | 💾 ElastiCache Clusters | {{ state.attributes.elasticache_clusters | default(0) }} |
          | 🪣 S3 Buckets | {{ state.attributes.s3_buckets | default(0) }} |
          | 💿 EBS Volumes | {{ state.attributes.ebs_volumes | default(0) }} ({{ state.attributes.ebs_unattached | default(0) }} unattached) |
          | 📁 EFS File Systems | {{ state.attributes.efs_file_systems | default(0) }} |

          #### 🌐 Networking & Messaging
          | Resource | Count |
          |----------|-------|
          | 🌐 ALB/NLB Load Balancers | {{ state.attributes.load_balancers | default(0) }} |
          | 🔁 Classic Load Balancers | {{ state.attributes.classic_load_balancers | default(0) }} |
          | 🔢 Elastic IPs | {{ state.attributes.elastic_ips | default(0) }} ({{ state.attributes.elastic_ips_unattached | default(0) }} unattached) |
          | 🔔 SNS Topics | {{ state.attributes.sns_topics | default(0) }} |
          | 📬 SQS Queues | {{ state.attributes.sqs_queues | default(0) }} |
          | 🌊 Kinesis Streams | {{ state.attributes.kinesis_streams | default(0) }} |

          #### 🔌 APIs & CDN
          | Resource | Count |
          |----------|-------|
          | 🔌 API Gateways | {{ state.attributes.api_gateways | default(0) }} |
          | ☁️ CloudFront Distributions | {{ state.attributes.cloudfront_distributions | default(0) }} |
          | 🌐 Route 53 Hosted Zones | {{ state.attributes.route53_zones | default(0) }} |

          #### 📊 Monitoring
          | Resource | Count |
          |----------|-------|
          | ⏰ CloudWatch Alarms | {{ state.attributes.cloudwatch_alarms | default(0) }} ({{ state.attributes.cloudwatch_alarms_alarm | default(0) }} in ALARM) |

          ---
          {% endif -%}
          {%- endif -%}
          {%- endfor %}
      - type: horizontal-stack
        cards:
          - type: button
            name: Refresh AWS Data
            icon: mdi:refresh
            tap_action:
              action: call-service
              service: aws_infrastructure.refresh_account
              service_data:
                account_name: live
          - type: button
            name: AWS Console
            icon: mdi:aws
            tap_action:
              action: url
              url_path: https://console.aws.amazon.com/
      - type: markdown
        content: >
          ### 💡 Dashboard Info


          **Monitoring 23 AWS Services:**
          EC2, RDS, Lambda, ECS, EKS, DynamoDB, ElastiCache, S3, EBS, EFS,
          ALB/NLB Load Balancers, Classic Load Balancers, Auto Scaling Groups,
          Elastic Beanstalk, SNS, SQS, Kinesis, CloudWatch Alarms, Elastic IPs,
          API Gateway, CloudFront, Route 53


          **Cost Data**: Updates daily (24hr delay for new accounts)
          **Resource Counts**: Updates every 5 minutes
          **Dynamic Regions**: Only shows regions with resources
          **Global Services**: CloudFront and Route 53 shown under us-east-1
