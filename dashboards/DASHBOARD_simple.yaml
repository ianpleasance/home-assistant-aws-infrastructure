title: AWS Overview
views:
  - title: Overview
    path: aws-overview
    icon: mdi:aws
    cards:
      - type: markdown
        content: >
          # 🌍 AWS Global Overview


          {% set total = states('sensor.aws_live_global_summary') | int(0) %}

          {% set active_regions = state_attr('sensor.aws_live_global_summary',
          'active_regions') | int(0) %}

          {% set ec2_running = state_attr('sensor.aws_live_global_summary',
          'ec2_running') | int(0) %}

          {% set ec2_stopped = state_attr('sensor.aws_live_global_summary',
          'ec2_stopped') | int(0) %}

          {% set lambda_count = state_attr('sensor.aws_live_global_summary',
          'lambda_functions') | int(0) %}

          {% set rds_count = state_attr('sensor.aws_live_global_summary',
          'rds_instances') | int(0) %}

          {% set lb_count = state_attr('sensor.aws_live_global_summary',
          'load_balancers') | int(0) %}

          {% set clb_count = state_attr('sensor.aws_live_global_summary',
          'classic_load_balancers') | int(0) %}

          {% set asg_count = state_attr('sensor.aws_live_global_summary',
          'auto_scaling_groups') | int(0) %}

          {% set dynamodb_count = state_attr('sensor.aws_live_global_summary',
          'dynamodb_tables') | int(0) %}

          {% set elasticache_count =
          state_attr('sensor.aws_live_global_summary', 'elasticache_clusters') |
          int(0) %}

          {% set ecs_count = state_attr('sensor.aws_live_global_summary',
          'ecs_clusters') | int(0) %}

          {% set eks_count = state_attr('sensor.aws_live_global_summary',
          'eks_clusters') | int(0) %}

          {% set ebs_count = state_attr('sensor.aws_live_global_summary',
          'ebs_volumes') | int(0) %}

          {% set ebs_unattached = state_attr('sensor.aws_live_global_summary',
          'ebs_unattached') | int(0) %}

          {% set sns_count = state_attr('sensor.aws_live_global_summary',
          'sns_topics') | int(0) %}

          {% set sqs_count = state_attr('sensor.aws_live_global_summary',
          'sqs_queues') | int(0) %}

          {% set s3_count = state_attr('sensor.aws_live_global_summary',
          's3_buckets') | int(0) %}

          {% set efs_count = state_attr('sensor.aws_live_global_summary',
          'efs_file_systems') | int(0) %}

          {% set kinesis_count = state_attr('sensor.aws_live_global_summary',
          'kinesis_streams') | int(0) %}

          {% set beanstalk_count = state_attr('sensor.aws_live_global_summary',
          'beanstalk_environments') | int(0) %}

          {% set route53_count = state_attr('sensor.aws_live_global_summary',
          'route53_zones') | int(0) %}

          {% set apigw_count = state_attr('sensor.aws_live_global_summary',
          'api_gateways') | int(0) %}

          {% set cloudfront_count = state_attr('sensor.aws_live_global_summary',
          'cloudfront_distributions') | int(0) %}

          {% set vpc_count = state_attr('sensor.aws_live_global_summary',
          'vpcs') | int(0) %}

          {% set acm_count = state_attr('sensor.aws_live_global_summary',
          'acm_certificates') | int(0) %}

          {% set acm_expiring = state_attr('sensor.aws_live_global_summary',
          'acm_expiring_30d') | int(0) %}

          {% set ecr_count = state_attr('sensor.aws_live_global_summary',
          'ecr_repositories') | int(0) %}

          {% set cloudtrail_count = state_attr('sensor.aws_live_global_summary',
          'cloudtrail_trails') | int(0) %}

          {% set cloudtrail_logging =
          state_attr('sensor.aws_live_global_summary', 'cloudtrail_logging') |
          int(0) %}

          {% set iam_users = state_attr('sensor.aws_live_global_summary',
          'iam_users') | int(0) %}

          {% set iam_no_mfa = state_attr('sensor.aws_live_global_summary',
          'iam_users_no_mfa') | int(0) %}

          {% set iam_old_keys = state_attr('sensor.aws_live_global_summary',
          'iam_users_old_keys') | int(0) %}

          {% set iam_roles = state_attr('sensor.aws_live_global_summary',
          'iam_roles') | int(0) %}

          {% set iam_unused_roles = state_attr('sensor.aws_live_global_summary',
          'iam_roles_unused_90d') | int(0) %}

          {% set redshift_count = state_attr('sensor.aws_live_global_summary',
          'redshift_clusters') | int(0) %}

          {% set acm_count = state_attr('sensor.aws_live_global_summary',
          'acm_certificates') | int(0) %}

          {% set acm_expiring = state_attr('sensor.aws_live_global_summary',
          'acm_expiring_30d') | int(0) %}

          {% set ecr_count = state_attr('sensor.aws_live_global_summary',
          'ecr_repositories') | int(0) %}

          {% set cloudtrail_count = state_attr('sensor.aws_live_global_summary',
          'cloudtrail_trails') | int(0) %}

          {% set cloudtrail_logging =
          state_attr('sensor.aws_live_global_summary', 'cloudtrail_logging') |
          int(0) %}

          {% set iam_users = state_attr('sensor.aws_live_global_summary',
          'iam_users') | int(0) %}

          {% set iam_no_mfa = state_attr('sensor.aws_live_global_summary',
          'iam_users_no_mfa') | int(0) %}

          {% set iam_old_keys = state_attr('sensor.aws_live_global_summary',
          'iam_users_old_keys') | int(0) %}

          {% set iam_roles = state_attr('sensor.aws_live_global_summary',
          'iam_roles') | int(0) %}

          {% set iam_unused_roles = state_attr('sensor.aws_live_global_summary',
          'iam_roles_unused_90d') | int(0) %}

          {% set redshift_count = state_attr('sensor.aws_live_global_summary',
          'redshift_clusters') | int(0) %}

          {% set cw_alarms = state_attr('sensor.aws_live_global_summary',
          'cloudwatch_alarms') | int(0) %}

          {% set cw_alarms_alarm = state_attr('sensor.aws_live_global_summary',
          'cloudwatch_alarms_alarm') | int(0) %}

          {% set eips_count = state_attr('sensor.aws_live_global_summary',
          'elastic_ips') | int(0) %}

          {% set eips_unattached = state_attr('sensor.aws_live_global_summary',
          'elastic_ips_unattached') | int(0) %}


          **Total Resources:** {{ total }}  

          **Active Regions:** {{ active_regions }}


          ### 💻 Compute

          - **EC2 Running:** {{ ec2_running }} | Stopped: {{ ec2_stopped }}

          - **Lambda Functions:** {{ lambda_count }}

          - **ECS Clusters:** {{ ecs_count }}

          - **EKS Clusters:** {{ eks_count }}

          - **Auto Scaling Groups:** {{ asg_count }}


          ### 🗄️ Data & Storage

          - **RDS Databases:** {{ rds_count }}

          - **DynamoDB Tables:** {{ dynamodb_count }}

          - **ElastiCache Clusters:** {{ elasticache_count }}

          - **S3 Buckets:** {{ s3_count }}

          - **EFS File Systems:** {{ efs_count }}

          - **ACM Certificates:** {{ acm_count }}{% if acm_expiring > 0 %} ⚠️ {{
          acm_expiring }} expiring in 30d{% endif %}

          - **ECR Repositories:** {{ ecr_count }}

          - **Redshift Clusters:** {{ redshift_count }}

          - **EBS Volumes:** {{ ebs_count }} ({{ ebs_unattached }} unattached)


          ### 🌐 Networking & Messaging

          - **VPCs:** {{ vpc_count }}

          - **Route 53 Hosted Zones:** {{ route53_count }}

          - **API Gateways:** {{ apigw_count }}

          - **CloudFront Distributions:** {{ cloudfront_count }}

          - **ALB/NLB Load Balancers:** {{ lb_count }}

          - **Classic Load Balancers:** {{ clb_count }}

          - **Elastic IPs:** {{ eips_count }} ({{ eips_unattached }} unattached)

          - **Kinesis Streams:** {{ kinesis_count }}

          - **SNS Topics:** {{ sns_count }}

          - **SQS Queues:** {{ sqs_count }}


          ### 🔐 Security & Certificates

          - **ACM Certificates:** {{ acm_count }}{% if acm_expiring > 0 %} ⚠️ {{
          acm_expiring }} expiring in 30 days{% endif %}

          - **CloudTrail Trails:** {{ cloudtrail_count }} ({{ cloudtrail_logging
          }} logging){% if cloudtrail_count > cloudtrail_logging %} ⚠️ {{
          cloudtrail_count - cloudtrail_logging }} not logging{% endif %}

          - **IAM Users:** {{ iam_users }}{% if iam_no_mfa > 0 %} ⚠️ {{
          iam_no_mfa }} without MFA{% endif %}{% if iam_old_keys > 0 %} ⚠️ {{
          iam_old_keys }} old keys{% endif %}

          - **IAM Roles:** {{ iam_roles }}{% if iam_unused_roles > 0 %} ⚠️ {{
          iam_unused_roles }} unused 90d{% endif %}


          ### 📊 Monitoring

          - **CloudWatch Alarms:** {{ cw_alarms }} ({{ cw_alarms_alarm }} in
          ALARM state)
      - type: markdown
        content: >
          ## 💰 Current AWS Costs


          {% set yesterday = states('sensor.aws_live_global_cost_yesterday') %}

          {% set mtd = states('sensor.aws_live_global_cost_month_to_date') %}


          {% if yesterday in ['unknown', 'unavailable'] or mtd in ['unknown',
          'unavailable'] %}

          **⏳ Cost data is being collected...**


          AWS Cost Explorer data typically takes 24 hours to populate after
          initial setup.

          Check back tomorrow!

          {% else %}


          | Period | Amount |

          |--------|--------|

          | 💵 Yesterday | ${{ yesterday }} |

          | 📅 Month to Date | ${{ mtd }} |

          {% endif %}
      - type: conditional
        conditions:
          - condition: state
            entity: sensor.aws_live_global_cost_yesterday
            state_not: unknown
          - condition: state
            entity: sensor.aws_live_global_cost_yesterday
            state_not: unavailable
        card:
          type: history-graph
          title: 📈 Daily Cost Trend (Last 7 Days)
          hours_to_show: 168
          entities:
            - entity: sensor.aws_live_global_cost_yesterday
              name: Daily Cost
      - type: conditional
        conditions:
          - condition: state
            entity: sensor.aws_live_global_cost_month_to_date
            state_not: unknown
          - condition: state
            entity: sensor.aws_live_global_cost_month_to_date
            state_not: unavailable
        card:
          type: history-graph
          title: 📊 Month to Date Cost Growth
          hours_to_show: 720
          entities:
            - entity: sensor.aws_live_global_cost_month_to_date
              name: MTD Cost
      - type: markdown
        content: >
          ## 🔝 Top Service Costs (Yesterday)


          {% set service_sensors = states.sensor | selectattr('entity_id',
          'search', 'sensor.aws_live_global_cost_service_') | list %}

          {% if service_sensors | length > 0 %}


          | Service | Cost | % |

          |---------|------|---|

          {% for sensor in service_sensors | sort(attribute='state',
          reverse=true) -%}

          {%- if sensor.state not in ['unknown', 'unavailable'] -%}

          | {{ sensor.attributes.service_name | default(sensor.name |
          replace('cost service ', '')) | title }} | ${{ sensor.state }} | {{
          sensor.attributes.percentage | default(0) }}% |

          {% endif -%}

          {%- endfor %}

          {% else %}

          _Cost breakdown will appear after 24 hours_

          {% endif %}
      - type: markdown
        content: >
          # 🌍 Resources by Region


          {% for state in states.sensor -%}

          {%- if 'aws_live' in state.entity_id and
          state.entity_id.endswith('_summary') and 'global' not in
          state.entity_id -%}

          {%- if state.state not in ['unknown', 'unavailable'] and state.state |
          int(0) > 0 -%}

          {%- set region = state.attributes.region -%}

          {%- set total = state.state | int(0) -%}

          {%- set ec2_r = state.attributes.ec2_running | default(0) -%}

          {%- set lambda_f = state.attributes.lambda_functions | default(0) -%}

          {%- set rds = state.attributes.rds_instances | default(0) -%}

          {%- set dynamo = state.attributes.dynamodb_tables | default(0) -%}

          {%- set s3 = state.attributes.s3_buckets | default(0) %}


          **{{ region | upper | replace('_', '-') }}:** {{ total }} resources
          (EC2: {{ ec2_r }}, Lambda: {{ lambda_f }}, RDS: {{ rds }}, DynamoDB:
          {{ dynamo }}, S3: {{ s3 }})  

          {% endif -%}

          {%- endif -%}

          {%- endfor %}
      - type: markdown
        content: >
          # 📍 Regional Details


          {% for state in states.sensor -%}

          {%- if 'aws_live' in state.entity_id and
          state.entity_id.endswith('_summary') and 'global' not in
          state.entity_id -%}

          {%- if state.state not in ['unknown', 'unavailable', 'None'] and
          state.state | int(0) > 0 -%}

          {%- set region = state.attributes.region -%}

          {%- set region_name = region | upper | replace('_', '-') -%}

          {%- set flag_map = {
            'us-east-1': '🇺🇸', 'us-east-2': '🇺🇸', 'us-west-1': '🇺🇸', 'us-west-2': '🇺🇸',
            'eu-west-1': '🇮🇪', 'eu-west-2': '🇬🇧', 'eu-west-3': '🇫🇷',
            'eu-central-1': '🇩🇪', 'eu-north-1': '🇸🇪', 'eu-south-1': '🇮🇹',
            'ap-south-1': '🇮🇳', 'ap-northeast-1': '🇯🇵', 'ap-northeast-2': '🇰🇷',
            'ap-northeast-3': '🇯🇵', 'ap-southeast-1': '🇸🇬', 'ap-southeast-2': '🇦🇺',
            'ca-central-1': '🇨🇦', 'sa-east-1': '🇧🇷'
          } -%}

          {%- set flag = flag_map.get(region, '🌍') %}


          ### {{ flag }} {{ region_name }}


          **Total Resources:** {{ state.state }}


          #### 💻 Compute

          | Resource | Count |

          |----------|-------|

          | 🟢 EC2 Running | {{ state.attributes.ec2_running | default(0) }} |

          | 🔴 EC2 Stopped | {{ state.attributes.ec2_stopped | default(0) }} |

          | ⚡ Lambda Functions | {{ state.attributes.lambda_functions |
          default(0) }} |

          | 🐳 ECS Clusters | {{ state.attributes.ecs_clusters | default(0) }} |

          | ☸️ EKS Clusters | {{ state.attributes.eks_clusters | default(0) }} |

          | 📈 Auto Scaling Groups | {{ state.attributes.auto_scaling_groups |
          default(0) }} |


          #### 🗄️ Data & Storage

          | Resource | Count |

          |----------|-------|

          | 🔐 ACM Certificates | {{ state.attributes.acm_certificates |
          default(0) }}{% if state.attributes.acm_expiring_30d | default(0) > 0
          %} ⚠️{% endif %} |

          | 🐳 ECR Repositories | {{ state.attributes.ecr_repositories |
          default(0) }} |

          | 🛡️ CloudTrail Trails | {{ state.attributes.cloudtrail_trails |
          default(0) }} ({{ state.attributes.cloudtrail_logging | default(0) }}
          logging) |



          | Resource | Count |

          |----------|-------|

          | 🗄️ RDS Databases | {{ state.attributes.rds_instances | default(0)
          }} |

          | 📊 DynamoDB Tables | {{ state.attributes.dynamodb_tables |
          default(0) }} |

          | 💾 ElastiCache Clusters | {{ state.attributes.elasticache_clusters |
          default(0) }} |

          | 🪣 S3 Buckets | {{ state.attributes.s3_buckets | default(0) }} |

          | 🗂️ EFS File Systems | {{ state.attributes.efs_file_systems |
          default(0) }} |

          | 🔴 Redshift Clusters | {{ state.attributes.redshift_clusters |
          default(0) }} |

          | 🔐 ACM Certificates | {{ state.attributes.acm_certificates |
          default(0) }} |

          | 💿 EBS Volumes | {{ state.attributes.ebs_volumes | default(0) }} ({{
          state.attributes.ebs_unattached | default(0) }} unattached) |


          #### 🌐 Networking & Messaging

          | Resource | Count |

          |----------|-------|

          | 🌐 ALB/NLB Load Balancers | {{ state.attributes.load_balancers |
          default(0) }} |

          | 🔁 Classic Load Balancers | {{
          state.attributes.classic_load_balancers | default(0) }} |

          | 🔢 Elastic IPs | {{ state.attributes.elastic_ips | default(0) }} ({{
          state.attributes.elastic_ips_unattached | default(0) }} unattached) |

          | 🏗️ VPCs | {{ state.attributes.vpcs | default(0) }} |

          | 🔌 API Gateways | {{ state.attributes.api_gateways | default(0) }} |

          | 🌊 Kinesis Streams | {{ state.attributes.kinesis_streams |
          default(0) }} |

          | 🔔 SNS Topics | {{ state.attributes.sns_topics | default(0) }} |

          | 📬 SQS Queues | {{ state.attributes.sqs_queues | default(0) }} |


          #### 📊 Monitoring

          | Resource | Count |

          |----------|-------|

          | ⏰ CloudWatch Alarms | {{ state.attributes.cloudwatch_alarms |
          default(0) }} ({{ state.attributes.cloudwatch_alarms_alarm |
          default(0) }} in ALARM) |


          ---

          {% endif -%}

          {%- endif -%}

          {%- endfor %}
      - type: horizontal-stack
        cards:
          - type: button
            name: Refresh AWS Data
            icon: mdi:refresh
            tap_action:
              action: call-service
              service: aws_infrastructure.refresh_account
              service_data:
                account_name: live
          - type: button
            name: AWS Console
            icon: mdi:aws
            tap_action:
              action: url
              url_path: https://console.aws.amazon.com/
      - type: markdown
        content: >
          ### 💡 Dashboard Info


          **Monitoring 28 AWS Services:**  

          EC2, RDS, Redshift, Lambda, ECS, EKS, Beanstalk, DynamoDB,
          ElastiCache, S3, EBS, EFS, ECR, IAM, VPC, ACM, CloudTrail, Route 53,
          CloudFront, API Gateway, ALB/NLB Load Balancers, Classic Load
          Balancers, Auto Scaling, Kinesis, SNS, SQS, CloudWatch Alarms, Elastic
          IPs


          **Cost Data**: Updates daily (24hr delay for new accounts)  

          **Resource Counts**: Updates every 5 minutes  

          **Dynamic Regions**: Only shows regions with resources


          **Set up cost alerts:**


          automation:
            trigger:
              platform: numeric_state
              entity_id: sensor.aws_live_global_cost_yesterday
              above: 100
            action:
              service: notify.mobile_app
              data:
                message: "AWS cost yesterday exceeded expected budget"
