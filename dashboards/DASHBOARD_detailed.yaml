          ---


          {% for state in states.sensor -%}
          {%- if state.entity_id.startswith('sensor.aws_live_') and '_kinesis_' in state.entity_id and '_kinesis_count' not in state.entity_id -%}
          {%- set stream_name = state.attributes.stream_name | default('Unknown') -%}
          {%- set stream_status = state.state -%}
          {%- set icon = '🟢' if stream_status == 'ACTIVE' else '⚫' %}

          ### {{ icon }} {{ stream_name }}
          - **Status**: {{ stream_status }}
          - **Mode**: {{ state.attributes.stream_mode }}
          - **Shards**: {{ state.attributes.shard_count | default('N/A') }}
          - **Retention**: {{ state.attributes.retention_hours | default('N/A') }} hours
          - **Consumers**: {{ state.attributes.consumer_count | default(0) }}

          {% endif -%}
          {%- endfor %}

          {% if states.sensor | selectattr('entity_id', 'search', '_kinesis_') | rejectattr('entity_id', 'search', '_kinesis_count') | list | length == 0 -%}
          _No Kinesis streams found_
          {% endif %}
  - title: Networking
    path: aws-networking
    icon: mdi:lan
    cards:
      - type: markdown
        content: >
          # 🌐 ALB / NLB Load Balancers


          **{{ state_attr('sensor.aws_live_global_summary', 'load_balancers') }} load balancers**


          ---


          {% for state in states.sensor -%}
          {%- if state.entity_id.startswith('sensor.aws_live_') and '_lb_' in state.entity_id and '_classic_lb_' not in state.entity_id -%}
          {%- set lb_name = state.attributes.name | default('Unknown') -%}
          {%- set lb_state = state.state -%}
          {%- set icon = '🟢' if lb_state == 'active' else '⚫' %}

          ### {{ icon }} {{ lb_name }}
          - **State**: {{ lb_state }}
          - **Type**: {{ state.attributes.type | upper }}
          - **Scheme**: {{ state.attributes.scheme }}
          - **DNS**: `{{ state.attributes.dns_name }}`
          - **VPC**: {{ state.attributes.vpc_id }}

          {% endif -%}
          {%- endfor %}

          {% if states.sensor | selectattr('entity_id', 'search', '_lb_') | rejectattr('entity_id', 'search', '_classic_lb_') | list | length == 0 -%}
          _No ALB/NLB load balancers found_
          {% endif %}
      - type: markdown
        content: >
          # 🔁 Classic Load Balancers


          **{{ state_attr('sensor.aws_live_global_summary', 'classic_load_balancers') }} classic load balancers**


          ---


          {% for state in states.sensor -%}
          {%- if state.entity_id.startswith('sensor.aws_live_') and '_classic_lb_' in state.entity_id and '_classic_lb_count' not in state.entity_id -%}
          {%- set lb_name = state.attributes.name | default('Unknown') -%}
          {%- set instance_count = state.state | int(0) %}

          ### 🔁 {{ lb_name }}
          - **Instances**: {{ instance_count }}
          - **Scheme**: {{ state.attributes.scheme | default('N/A') }}
          - **DNS**: `{{ state.attributes.dns_name }}`
          - **VPC**: {{ state.attributes.vpc_id | default('EC2-Classic') }}
          - **Health Check**: {{ state.attributes.health_check_target | default('N/A') }}
          - **Created**: {{ state.attributes.created_time | default('N/A') }}
          {%- set listeners = state.attributes.listeners | default([]) %}
          {%- if listeners | length > 0 %}
          - **Listeners**: {% for l in listeners %}{{ l.lb_protocol }}:{{ l.lb_port }}→{{ l.instance_protocol }}:{{ l.instance_port }}{% if not loop.last %}, {% endif %}{% endfor %}
          {%- endif %}

          {% endif -%}
          {%- endfor %}

          {% if states.sensor | selectattr('entity_id', 'search', '_classic_lb_') | rejectattr('entity_id', 'search', '_classic_lb_count') | list | length == 0 -%}
          _No Classic Load Balancers found_
          {% endif %}
      - type: markdown
        content: >
          # 🔢 Elastic IPs


          **{{ state_attr('sensor.aws_live_global_summary', 'elastic_ips') }} IPs** ({{ state_attr('sensor.aws_live_global_summary', 'elastic_ips_unattached') }} unattached)


          ---


          {% for state in states.sensor -%}
          {%- if state.entity_id.startswith('sensor.aws_live_') and '_eip_' in state.entity_id and '_eip_count' not in state.entity_id -%}
          {%- set ip = state.attributes.ip_address | default('Unknown') -%}
          {%- set attached = state.state == 'attached' -%}
          {%- set icon = '🟢' if attached else '🔴' %}

          ### {{ icon }} {{ ip }}
          - **Status**: {{ state.state }}
          - **Allocation ID**: {{ state.attributes.allocation_id }}
          - **Associated with**: {{ state.attributes.associated_with | default('None') }}

          {% endif -%}
          {%- endfor %}

          {% if states.sensor | selectattr('entity_id', 'search', '_eip_') | rejectattr('entity_id', 'search', '_eip_count') | list | length == 0 -%}
          _No Elastic IPs found_
          {% endif %}
  - title: API & CDN
    path: aws-api-cdn
    icon: mdi:api
    cards:
      - type: markdown
        content: >
          # 🔌 API Gateways


          **{{ state_attr('sensor.aws_live_global_summary', 'api_gateways') }} APIs**


          ---


          {% for state in states.sensor -%}
          {%- if state.entity_id.startswith('sensor.aws_live_') and '_apigw_' in state.entity_id -%}
          {%- set api_name = state.attributes.name | default('Unknown') -%}
          {%- set api_type = state.state -%}
          {%- set icon = '🔵' if api_type == 'REST' else '🟣' if api_type == 'HTTP' else '🟠' %}

          ### {{ icon }} {{ api_name }}
          - **Type**: {{ api_type }}
          - **ID**: {{ state.attributes.api_id }}
          - **Endpoint Type**: {{ state.attributes.endpoint_type | default('N/A') }}
          {%- if state.attributes.api_endpoint %}
          - **Endpoint**: `{{ state.attributes.api_endpoint }}`
          {%- endif %}
          {%- if state.attributes.description %}
          - **Description**: {{ state.attributes.description }}
          {%- endif %}
          - **Created**: {{ state.attributes.created_date | default('N/A') }}

          {% endif -%}
          {%- endfor %}

          {% if states.sensor | selectattr('entity_id', 'search', '_apigw_') | list | length == 0 -%}
          _No API Gateways found_
          {% endif %}
      - type: markdown
        content: >
