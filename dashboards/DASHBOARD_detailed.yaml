  - title: Costs
    path: aws-costs
    icon: mdi:cash
    cards:
      - type: markdown
        content: >
          # 💰 AWS Costs


          {% set yesterday = states('sensor.aws_live_global_cost_yesterday') %}
          {% set mtd = states('sensor.aws_live_global_cost_month_to_date') %}

          {% if yesterday in ['unknown', 'unavailable'] or mtd in ['unknown', 'unavailable'] %}
          ## ⏳ Cost Data Loading...

          AWS Cost Explorer data typically takes **24 hours** to populate.
          Check back tomorrow!
          {% else %}
          **Yesterday:** ${{ yesterday }} • **Month to Date:** ${{ mtd }}
          {% endif %}
      - type: conditional
        conditions:
          - condition: state
            entity: sensor.aws_live_global_cost_yesterday
            state_not: unknown
          - condition: state
            entity: sensor.aws_live_global_cost_yesterday
            state_not: unavailable
        card:
          type: history-graph
          title: Daily Cost Trend (30 Days)
          hours_to_show: 720
          entities:
            - entity: sensor.aws_live_global_cost_yesterday
              name: Daily Cost
      - type: conditional
        conditions:
          - condition: state
            entity: sensor.aws_live_global_cost_month_to_date
            state_not: unknown
          - condition: state
            entity: sensor.aws_live_global_cost_month_to_date
            state_not: unavailable
        card:
          type: history-graph
          title: Month to Date Growth
          hours_to_show: 720
          entities:
            - entity: sensor.aws_live_global_cost_month_to_date
              name: MTD Cost
      - type: markdown
        content: >
          ## 💳 Cost by Service (Yesterday)


          {% set service_sensors = states.sensor | selectattr('entity_id', 'search', 'sensor.aws_live_global_cost_service_') | list %}
          {% if service_sensors | length > 0 %}

          | Rank | Service | Cost | % |
          |------|---------|------|---|
          {% for sensor in service_sensors | sort(attribute='state', reverse=true) -%}
          {%- if sensor.state not in ['unknown', 'unavailable'] -%}
          | {{ sensor.attributes.rank | default(loop.index) }} | {{ sensor.attributes.service_name | default(sensor.name) }} | ${{ sensor.state | float | round(2) }} | {{ sensor.attributes.percentage | default(0) }}% |
          {% endif -%}
          {%- endfor %}
          {% else %}
          _Service breakdown will appear after 24 hours_
          {% endif %}
