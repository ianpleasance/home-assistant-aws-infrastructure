          {% endif -%}

          {%- endfor %}


          {% if states.sensor | selectattr('entity_id', 'search', 'auto_scaling_group') |
          list | length == 0 -%}

          _No Auto Scaling Groups found_

          {% endif %}
  - title: Monitoring
    path: aws-monitoring
    icon: mdi:alarm-light
    cards:
      - type: markdown
        content: >
          # ⏰ CloudWatch Alarms


          {% set alarms = state_attr('sensor.aws_live_global_summary', 'cloudwatch_alarms') | int(0) %}
          {% set firing = state_attr('sensor.aws_live_global_summary', 'cloudwatch_alarms_alarm') | int(0) %}
          **{{ alarms }} {{ 'alarm' if alarms == 1 else 'alarms' }}** ({{ firing }} in ALARM state)


          ---


          {% for state in states.sensor -%}

          {%- if state.entity_id.startswith('sensor.aws_live_') and '_alarm_' in
          state.entity_id and '_alarm_count' not in state.entity_id -%}

          {%- set parts = state.entity_id.replace('sensor.aws_live_',
          '').split('_') -%}

          {%- set region = parts[0] | replace('_', '-') -%}

          {%- set alarm_name = state.attributes.alarm_name | default('Unknown')
          -%}

          {%- set alarm_state = state.state -%}

          {%- set icon = '🔴' if alarm_state == 'ALARM' else '🟢' if alarm_state
          == 'OK' else '⚪' %}


          ### {{ icon }} {{ alarm_name }}

          - **Region**: {{ region | upper }}

          - **State**: {{ alarm_state }}

          - **Metric**: {{ state.attributes.metric }}

          - **Namespace**: {{ state.attributes.namespace }}

          - **Reason**: {{ state.attributes.reason }}

          - **Enabled**: {{ state.attributes.enabled }}


          {% endif -%}

          {%- endfor %}


          {% if states.sensor | selectattr('entity_id', 'search', '_alarm_') |
          rejectattr('entity_id', 'search', '_alarm_count') | list | length == 0
          -%}

          _No CloudWatch alarms found_

          {% endif %}
  - title: Costs
    path: aws-costs
    icon: mdi:cash
    cards:
      - type: markdown
        content: >
          # 💰 AWS Costs


          {% set yesterday = states('sensor.aws_live_global_cost_yesterday') %}

          {% set mtd = states('sensor.aws_live_global_cost_month_to_date') %}


          {% if yesterday in ['unknown', 'unavailable'] or mtd in ['unknown',
          'unavailable'] %}

          ## ⏳ Cost Data Loading...


          AWS Cost Explorer data typically takes **24 hours** to populate.

          Check back tomorrow!

          {% else %}

          **Yesterday:** ${{ yesterday }} • **Month to Date:** ${{ mtd }}

          {% endif %}
      - type: conditional
        conditions:
          - condition: state
            entity: sensor.aws_live_global_cost_yesterday
            state_not: unknown
          - condition: state
            entity: sensor.aws_live_global_cost_yesterday
            state_not: unavailable
        card:
          type: history-graph
          title: Daily Cost Trend (30 Days)
          hours_to_show: 720
          entities:
            - entity: sensor.aws_live_global_cost_yesterday
              name: Daily Cost
      - type: conditional
        conditions:
          - condition: state
            entity: sensor.aws_live_global_cost_month_to_date
            state_not: unknown
          - condition: state
            entity: sensor.aws_live_global_cost_month_to_date
            state_not: unavailable
        card:
          type: history-graph
          title: Month to Date Growth
          hours_to_show: 720
          entities:
            - entity: sensor.aws_live_global_cost_month_to_date
              name: MTD Cost
      - type: markdown
        content: >
          ## 💳 Cost by Service (Yesterday)


          {% set service_sensors = states.sensor | selectattr('entity_id',
          'search', 'sensor.aws_live_global_cost_service_') | list %}

          {% if service_sensors | length > 0 %}


          | Rank | Service | Cost | % |

          |------|---------|------|---|

          {% for sensor in service_sensors | sort(attribute='state',
          reverse=true) -%}

          {%- if sensor.state not in ['unknown', 'unavailable'] -%}

          | {{ sensor.attributes.rank | default(loop.index) }} | {{
          sensor.attributes.service_name | default(sensor.name) }} | ${{
          sensor.state | float | round(2) }} | {{ sensor.attributes.percentage |
          default(0) }}% |

          {% endif -%}

          {%- endfor %}

          {% else %}

          _Service breakdown will appear after 24 hours_

          {% endif %}
