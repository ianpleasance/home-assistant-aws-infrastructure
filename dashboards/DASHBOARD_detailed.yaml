  - title: ASG
    path: aws-asg
    icon: mdi:chart-line
    cards:
      - type: markdown
        content: >
          # 📈 Auto Scaling Groups


          {% set n = state_attr('sensor.aws_live_global_summary', 'auto_scaling_groups') | int(0) %}
          **{{ n }} {{ 'group' if n == 1 else 'groups' }}**


