          {% endif -%}
          {%- endfor %}

          {% if states.sensor | selectattr('entity_id', 'search', '_elasticache_') | rejectattr('entity_id', 'search', '_elasticache_count') | list | length == 0 -%}
          _No ElastiCache clusters found_
