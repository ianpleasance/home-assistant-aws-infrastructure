          {% for state in states.sensor -%}
          {%- if state.entity_id.startswith('sensor.aws_live_') and '_sqs_' in state.entity_id and '_sqs_count' not in state.entity_id -%}
          {%- set queue_name = state.attributes.queue_name | default('Unknown') -%}
