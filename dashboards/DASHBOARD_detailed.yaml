          - **Status**: {{ table_status }}

          - **Items**: {{ state.attributes.item_count | default(0) }}

          - **Size**: {{ (state.attributes.size_bytes / 1024 / 1024) | round(2)
          }} MB

          - **Created**: {{ state.attributes.created }}


          {% endif -%}

          {%- endfor %}


          {% if states.sensor | selectattr('entity_id', 'search', '_dynamodb_')
          | rejectattr('entity_id', 'search', '_dynamodb_count') | list | length
