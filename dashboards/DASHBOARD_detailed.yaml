          ### {{ icon }} {{ volume_id }}
          - **State**: {{ volume_state }}
          - **Size**: {{ state.attributes.size_gb | default('N/A') }} GB
          - **Type**: {{ state.attributes.type | default('N/A') }}
          - **IOPS**: {{ state.attributes.iops | default('N/A') }}
          - **AZ**: {{ state.attributes.availability_zone | default('N/A') }}
          - **Attached to**: {{ state.attributes.attached_to | default('None') }}
          - **Encrypted**: {{ state.attributes.encrypted | default('N/A') }}
          - **Created**: {{ state.attributes.created | default('N/A') }}

          {% endif -%}
          {%- endfor %}

          {% if states.sensor | selectattr('entity_id', 'search', '_ebs_vol_') | list | length == 0 -%}
          _No EBS volumes found_
          {% endif %}
      - type: markdown
        content: >
          # 📁 EFS File Systems


          **{{ state_attr('sensor.aws_live_global_summary', 'efs_file_systems') }} file systems**


          ---


          {% for state in states.sensor -%}
          {%- if state.entity_id.startswith('sensor.aws_live_') and '_efs_' in state.entity_id and '_efs_count' not in state.entity_id -%}
          {%- set fs_state = state.state -%}
          {%- set icon = '🟢' if fs_state == 'available' else '⚫' %}

          ### {{ icon }} {{ state.attributes.name | default(state.attributes.filesystem_id) }}
          - **ID**: {{ state.attributes.filesystem_id }}
          - **State**: {{ fs_state }}
          - **Size**: {{ state.attributes.size_gb | default(0) }} GB
          - **Mount Targets**: {{ state.attributes.number_of_mount_targets }}
          - **Performance Mode**: {{ state.attributes.performance_mode }}
          - **Throughput Mode**: {{ state.attributes.throughput_mode }}
          - **Encrypted**: {{ state.attributes.encrypted }}
          - **Created**: {{ state.attributes.created_time }}

          {% endif -%}
          {%- endfor %}

          {% if states.sensor | selectattr('entity_id', 'search', '_efs_') | rejectattr('entity_id', 'search', '_efs_count') | list | length == 0 -%}
