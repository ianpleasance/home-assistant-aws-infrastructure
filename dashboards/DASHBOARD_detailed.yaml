          **{{ state_attr('sensor.aws_live_global_summary', 'cloudfront_distributions') }} distributions**


          ---


          {% for state in states.sensor -%}
          {%- if state.entity_id.startswith('sensor.aws_live_') and '_cloudfront_' in state.entity_id and '_cloudfront_count' not in state.entity_id -%}
          {%- set dist_status = state.state -%}
          {%- set icon = '🟢' if dist_status == 'Deployed' else '🟡' %}

          ### {{ icon }} {{ state.attributes.distribution_id }}
          - **Status**: {{ dist_status }}
          - **Domain**: `{{ state.attributes.domain_name }}`
          - **Enabled**: {{ state.attributes.enabled }}
          - **HTTP Version**: {{ state.attributes.http_version | default('N/A') }}
          - **Price Class**: {{ state.attributes.price_class | default('N/A') }}
          {%- set aliases = state.attributes.aliases | default([]) %}
          {%- if aliases | length > 0 %}
          - **Aliases**: {{ aliases | join(', ') }}
          {%- endif %}
          {%- set origins = state.attributes.origins | default([]) %}
          {%- if origins | length > 0 %}
          - **Origins**: {{ origins | join(', ') }}
          {%- endif %}
          {%- if state.attributes.comment %}
          - **Comment**: {{ state.attributes.comment }}
          {%- endif %}
          - **Modified**: {{ state.attributes.last_modified | default('N/A') }}

          {% endif -%}
          {%- endfor %}

          {% if states.sensor | selectattr('entity_id', 'search', '_cloudfront_') | rejectattr('entity_id', 'search', '_cloudfront_count') | list | length == 0 -%}
