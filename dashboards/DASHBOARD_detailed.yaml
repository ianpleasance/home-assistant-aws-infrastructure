title: AWS Detailed
views:
  - title: Overview
    path: aws-overview
    icon: mdi:aws
    cards:
      - type: markdown
        content: >
          # 🌍 AWS Overview


          **{{ states('sensor.aws_live_global_summary') }} Resources** • {% set
          yesterday = states('sensor.aws_live_global_cost_yesterday') %}{% if
          yesterday not in ['unknown', 'unavailable'] %}**${{ yesterday }}**
          yesterday{% else %}_Cost data loading..._{% endif %}
      - type: markdown
        content: >
          ## 💻 Compute


          | Resource | Count |

          |----------|-------|

          | 🟢 EC2 Running | {{ state_attr('sensor.aws_live_global_summary',
          'ec2_running') }} |

          | 🔴 EC2 Stopped | {{ state_attr('sensor.aws_live_global_summary',
          'ec2_stopped') }} |

          | ⚡ Lambda | {{ state_attr('sensor.aws_live_global_summary',
          'lambda_functions') }} |

          | 🐳 ECS Clusters | {{ state_attr('sensor.aws_live_global_summary',
          'ecs_clusters') }} |

          | ☸️ EKS Clusters | {{ state_attr('sensor.aws_live_global_summary',
          'eks_clusters') }} |

          | 📈 Auto Scaling Groups | {{
          state_attr('sensor.aws_live_global_summary', 'auto_scaling_groups') }}
          |
      - type: markdown
        content: >
          ## 🗄️ Data & Storage


          | Resource | Count |

          |----------|-------|

          | 🗄️ RDS Databases | {{ state_attr('sensor.aws_live_global_summary',
          'rds_instances') }} |

          | 📊 DynamoDB Tables | {{ state_attr('sensor.aws_live_global_summary',
          'dynamodb_tables') }} |

          | 💾 ElastiCache | {{ state_attr('sensor.aws_live_global_summary',
          'elasticache_clusters') }} |

          | 🪣 S3 Buckets | {{ state_attr('sensor.aws_live_global_summary',
          's3_buckets') }} |

          | 💿 EBS Volumes | {{ state_attr('sensor.aws_live_global_summary',
          'ebs_volumes') }} ({{ state_attr('sensor.aws_live_global_summary',
          'ebs_unattached') }} unattached) |
      - type: markdown
        content: >
          ## 🌐 Networking & Messaging


          | Resource | Count |

          |----------|-------|

          | 🌐 ALB/NLB Load Balancers | {{ state_attr('sensor.aws_live_global_summary', 'load_balancers') }} |

          | 🔁 Classic Load Balancers | {{ state_attr('sensor.aws_live_global_summary', 'classic_load_balancers') | default(0) }} |

          | 🔢 Elastic IPs | {{ state_attr('sensor.aws_live_global_summary',
          'elastic_ips') }} ({{ state_attr('sensor.aws_live_global_summary',
          'elastic_ips_unattached') }} unattached) |

          | 🔔 SNS Topics | {{ state_attr('sensor.aws_live_global_summary',
          'sns_topics') }} |

          | 📬 SQS Queues | {{ state_attr('sensor.aws_live_global_summary',
          'sqs_queues') }} |
      - type: markdown
        content: >
          ## 📊 Monitoring


          | Resource | Count |

          |----------|-------|

          | ⏰ CloudWatch Alarms | {{
          state_attr('sensor.aws_live_global_summary', 'cloudwatch_alarms') }}
          ({{ state_attr('sensor.aws_live_global_summary',
          'cloudwatch_alarms_alarm') }} in ALARM) |
      - type: conditional
        conditions:
          - condition: state
            entity: sensor.aws_live_global_cost_yesterday
            state_not: unknown
          - condition: state
            entity: sensor.aws_live_global_cost_yesterday
            state_not: unavailable
        card:
          type: history-graph
          title: 📈 Cost Trends (7 Days)
          hours_to_show: 168
          entities:
            - entity: sensor.aws_live_global_cost_yesterday
              name: Daily Cost
  - title: EC2
    path: aws-ec2
    icon: mdi:server
    cards:
      - type: markdown
        content: >
          # 🖥️ EC2 Instances


          {% set running = state_attr('sensor.aws_live_global_summary',
          'ec2_running') %}

          {% set stopped = state_attr('sensor.aws_live_global_summary',
          'ec2_stopped') %}

          **{{ running }} running** • {{ stopped }} stopped


          ---


          {% for state in states.sensor -%}

          {%- if state.entity_id.startswith('sensor.aws_live_') and '_ec2_i_' in
          state.entity_id -%}

          {%- set instance_id = state.attributes.instance_id |
          default('Unknown') -%}

          {%- set tags = state.attributes.tags | default({}) -%}

          {%- set instance_name = tags.get('Name', instance_id) -%}

          {%- set instance_state = state.state -%}

          {%- set icon = '🟢' if instance_state == 'running' else '🔴' if
          instance_state == 'stopped' else '⚫' %}


          ### {{ icon }} {{ instance_name }}

          - **Instance ID**: {{ instance_id }}

          - **State**: {{ instance_state }}

          - **Type**: {{ state.attributes.instance_type | default('N/A') }}

          - **Launched**: {{ state.attributes.launch_time | default('N/A') }}

          {% if tags | length > 1 -%}

          - **Tags**: {% for key, value in tags.items() -%}{%- if key != 'Name'
          -%}{{ key }}={{ value }}{% if not loop.last %}, {% endif %}{% endif
          -%}{%- endfor %}

          {% endif %}


          {% endif -%}

          {%- endfor %}


          {% if states.sensor | selectattr('entity_id', 'search', '_ec2_i_') |
          list | length == 0 -%}

          _No EC2 instances found_

          {% endif %}
  - title: Lambda
    path: aws-lambda
    icon: mdi:lambda
    cards:
      - type: markdown
        content: >
          # ⚡ Lambda Functions


          {% set n = state_attr('sensor.aws_live_global_summary', 'lambda_functions') | int(0) %}
          **{{ n }} {{ 'function' if n == 1 else 'functions' }}**


          ---


          {% for state in states.sensor -%}

          {%- if state.entity_id.startswith('sensor.aws_live_') and '_lambda_'
          in state.entity_id and '_lambda_count' not in state.entity_id -%}

          {%- set parts = state.entity_id.replace('sensor.aws_live_',
          '').split('_') -%}

          {%- set region = parts[0] | replace('_', '-') -%}

          {%- set function_name = state.attributes.function_name |
          default('Unknown') %}


          ### ⚡ {{ function_name }}

          - **Region**: {{ region | upper }}

          - **Runtime**: {{ state.attributes.runtime }}

          - **Memory**: {{ state.attributes.memory_size }} MB

          - **Timeout**: {{ state.attributes.timeout }} sec

          - **Code Size**: {{ (state.attributes.code_size / 1024) | round(1) }}
          KB

          - **Modified**: {{ state.attributes.last_modified }}


          {% endif -%}

          {%- endfor %}


          {% if states.sensor | selectattr('entity_id', 'search', '_lambda_') |
          rejectattr('entity_id', 'search', '_lambda_count') | list | length ==
          0 -%}

          _No Lambda functions found_

          {% endif %}
  - title: RDS
    path: aws-rds
    icon: mdi:database
    cards:
      - type: markdown
        content: >
          # 🗄️ RDS Databases


          {% set n = state_attr('sensor.aws_live_global_summary', 'rds_instances') | int(0) %}
          **{{ n }} {{ 'database' if n == 1 else 'databases' }}**


          ---


          {% for state in states.sensor -%}

          {%- if state.entity_id.startswith('sensor.aws_live_') and '_rds_' in
          state.entity_id and '_rds_count' not in state.entity_id -%}

          {%- set parts = state.entity_id.replace('sensor.aws_live_',
          '').split('_') -%}

          {%- set region = parts[0] | replace('_', '-') -%}

          {%- set db_id = state.attributes.db_instance_identifier |
          default('Unknown') -%}

          {%- set db_status = state.state -%}

          {%- set icon = '🟢' if db_status == 'available' else '⚫' %}


          ### {{ icon }} {{ db_id }}

          - **Region**: {{ region | upper }}

          - **Status**: {{ db_status }}

          - **Engine**: {{ state.attributes.engine }} {{
          state.attributes.engine_version }}

          - **Class**: {{ state.attributes.db_instance_class }}

          - **Storage**: {{ state.attributes.allocated_storage }} GB


          {% endif -%}

          {%- endfor %}


          {% if states.sensor | selectattr('entity_id', 'search', '_rds_') |
          rejectattr('entity_id', 'search', '_rds_count') | list | length == 0
          -%}

          _No RDS databases found_

          {% endif %}
  - title: DynamoDB
    path: aws-dynamodb
    icon: mdi:table
    cards:
