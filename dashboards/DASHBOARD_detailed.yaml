          hours_to_show: 720
          entities:
            - entity: sensor.aws_live_global_cost_month_to_date
              name: MTD Cost
      - type: markdown
        content: >
          ## 💳 Cost by Service (Yesterday)


          {% set service_sensors = states.sensor | selectattr('entity_id',
          'search', 'sensor.aws_live_global_cost_service_') | list %}

          {% if service_sensors | length > 0 %}


          | Rank | Service | Cost | % |

          |------|---------|------|---|

          {% for sensor in service_sensors | sort(attribute='state',
          reverse=true) -%}

          {%- if sensor.state not in ['unknown', 'unavailable'] -%}

          | {{ sensor.attributes.rank | default(loop.index) }} | {{
          sensor.attributes.service_name | default(sensor.name) }} | ${{
          sensor.state | float | round(2) }} | {{ sensor.attributes.percentage |
          default(0) }}% |

          {% endif -%}

          {%- endfor %}

          {% else %}

          _Service breakdown will appear after 24 hours_

          {% endif %}
