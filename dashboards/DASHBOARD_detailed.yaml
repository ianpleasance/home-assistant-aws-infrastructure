          **{{ state_attr('sensor.aws_live_global_summary', 'eks_clusters') }} clusters**


          ---


          {% for state in states.sensor -%}
          {%- if state.entity_id.startswith('sensor.aws_live_') and '_eks_' in state.entity_id and '_eks_count' not in state.entity_id -%}
          {%- set cluster_name = state.attributes.cluster_name | default('Unknown') -%}
          {%- set cluster_status = state.state -%}
          {%- set icon = '🟢' if cluster_status == 'ACTIVE' else '⚫' %}

          ### {{ icon }} {{ cluster_name }}
          - **Status**: {{ cluster_status }}
          - **Version**: {{ state.attributes.version }}
          - **Endpoint**: {{ state.attributes.endpoint }}
          - **Created**: {{ state.attributes.created_at }}

          {% endif -%}
          {%- endfor %}

          {% if states.sensor | selectattr('entity_id', 'search', '_eks_') | rejectattr('entity_id', 'search', '_eks_count') | list | length == 0 -%}
          _No EKS clusters found_
          {% endif %}
  - title: Storage
    path: aws-storage
    icon: mdi:harddisk
    cards:
      - type: markdown
        content: >
          # 📦 S3 Buckets


          **{{ state_attr('sensor.aws_live_global_summary', 's3_buckets') }} buckets**


          ---


          {% for state in states.sensor -%}
          {%- if state.entity_id.startswith('sensor.aws_live_') and '_s3_' in state.entity_id and '_s3_count' not in state.entity_id -%}
          {%- set bucket_name = state.attributes.bucket_name | default('Unknown') -%}

          ### 🪣 {{ bucket_name }}
          - **Region**: {{ state.state | upper }}
          - **Created**: {{ state.attributes.created }}

          {% endif -%}
          {%- endfor %}

          {% if states.sensor | selectattr('entity_id', 'search', '_s3_') | rejectattr('entity_id', 'search', '_s3_count') | list | length == 0 -%}
          _No S3 buckets found_
          {% endif %}
      - type: markdown
        content: >-
          # 💿 EBS Volumes


          **{{ state_attr('sensor.aws_live_global_summary', 'ebs_volumes') }} volumes** ({{ state_attr('sensor.aws_live_global_summary', 'ebs_unattached') }} unattached)


          ---


          {% for state in states.sensor -%}
          {%- if state.entity_id.startswith('sensor.aws_live_') and '_ebs_vol_' in state.entity_id -%}
          {%- set volume_id = state.attributes.volume_id | default('Unknown') -%}
          {%- set volume_state = state.state -%}
